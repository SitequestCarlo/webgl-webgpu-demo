<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebGL / WebGPU – Thesis Demos</title>
    <link rel="stylesheet" href="./src/app/style.css" />
  </head>
  <body>
    <div id="layout">
      <aside id="sidebar">
        <div class="sidebar-header">
          <h1>WebGL / WebGPU</h1>
          <p>Thesis &mdash; Rendering &amp; Performance</p>
        </div>
        <div class="api-toggle">
          <button id="btn-webgl"  class="api-btn gl  active">WebGL2</button>
          <button id="btn-webgpu" class="api-btn gpu">WebGPU</button>
        </div>
        <div id="sidebar-list"></div>
      </aside>
      <main id="main">
        <header id="showcase-header">
          <h2 id="showcase-title"></h2>
          <div id="showcase-tags"></div>
          <div id="api-warning"></div>
        </header>
        <div id="empty-state">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <path d="M3 9h18M9 21V9"/>
          </svg>
          <p>Wähle einen Showcase aus der Sidebar</p>
        </div>
        <div id="content-area">
          <iframe id="showcase-frame" title="Showcase" allowfullscreen></iframe>
          <div id="info-panel">
            <div id="code-split">
              <div id="file-list"></div>
              <div id="code-view">
                <pre><code id="code-block" class="hljs"></code></pre>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>
    <script type="module" src="./src/app/app.ts"></script>
  </body>
</html>
